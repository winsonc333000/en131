const GLOBAL_CSS = `
@import url('https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@400;600;700;800&family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --nb-bg: #fffdf5;
  --nb-text: #1a1a1a;
  --nb-border: #1a1a1a;
  --nb-shadow: #1a1a1a;
  --nb-yellow: #FFE500;
  --nb-orange: #FF6B35;
  --nb-blue: #4A90D9;
  --nb-green: #44CF6C;
  --nb-pink: #FF78C4;
  --nb-lavender: #C4B5FD;
  --nb-red: #EF4444;
  --nb-cyan: #22D3EE;
  --nb-cream: #FFF8E7;
  --heading: 'Lexend Mega', sans-serif;
  --body: 'Public Sans', sans-serif;
  --mono: 'Space Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--nb-bg);
  color: var(--nb-text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: var(--nb-yellow);
  color: var(--nb-text);
}

.nb-card-custom {
  background: white;
  border: 3px solid var(--nb-border);
  box-shadow: 6px 6px 0 var(--nb-shadow);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.nb-card-custom:hover {
  transform: translate(-2px, -2px);
  box-shadow: 8px 8px 0 var(--nb-shadow);
}

.nb-badge {
  display: inline-block;
  border: 2px solid var(--nb-border);
  box-shadow: 3px 3px 0 var(--nb-shadow);
  padding: 4px 12px;
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.nb-divider {
  border: none;
  border-top: 3px solid var(--nb-border);
  margin: 32px 0;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

@media (max-width: 700px) {
  .desktop-nav-links { display: none !important; }
  .mobile-toggle { display: block !important; }
}
@media (min-width: 701px) {
  .mobile-nav-dropdown { display: none !important; }
}
`;

const SECTIONS = [
  { id: "home", label: "Home" },
  { id: "essay1", label: "01" },
  { id: "essay2", label: "02" },
  { id: "essay3", label: "03" },
  { id: "letter", label: "Letter" },
];

const COLORS = ["var(--nb-yellow)", "var(--nb-orange)", "var(--nb-blue)", "var(--nb-green)", "var(--nb-pink)", "var(--nb-lavender)"];

/* ─── Marquee banner ─── */
function MarqueeBanner({ text, color = "var(--nb-yellow)" }) {
  const items = Array(8).fill(text);
  return (
    <div style={{
      background: color, borderTop: "3px solid var(--nb-border)",
      borderBottom: "3px solid var(--nb-border)", overflow: "hidden",
      padding: "10px 0", whiteSpace: "nowrap",
    }}>
      <div style={{
        display: "inline-flex", gap: 48,
        animation: "marquee 20s linear infinite",
      }}>
        {items.map((t, i) => (
          <span key={i} style={{
            fontFamily: "var(--heading)", fontSize: "0.75rem", fontWeight: 800,
            textTransform: "uppercase", letterSpacing: "0.15em",
          }}>
            {t} ★
          </span>
        ))}
        {items.map((t, i) => (
          <span key={`dup-${i}`} style={{
            fontFamily: "var(--heading)", fontSize: "0.75rem", fontWeight: 800,
            textTransform: "uppercase", letterSpacing: "0.15em",
          }}>
            {t} ★
          </span>
        ))}
      </div>
    </div>
  );
}

/* ─── Nav ─── */
function Nav({ active, onNavigate }) {
  const [mobileOpen, setMobileOpen] = useState(false);

  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      background: "var(--nb-bg)", borderBottom: "3px solid var(--nb-border)",
      padding: "0 clamp(16px, 3vw, 40px)",
    }}>
      <div style={{
        maxWidth: 1100, margin: "0 auto",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        height: 60,
      }}>
        <div
          onClick={() => onNavigate("home")}
          style={{
            fontFamily: "var(--heading)", fontSize: "1rem", fontWeight: 800,
            cursor: "pointer", background: "var(--nb-yellow)",
            padding: "6px 14px", border: "3px solid var(--nb-border)",
            boxShadow: "3px 3px 0 var(--nb-shadow)",
          }}
        >
          W.CHEN
        </div>

        <div className="desktop-nav-links" style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {SECTIONS.filter(s => s.id !== "home").map((s, i) => (
            <button
              key={s.id}
              onClick={() => onNavigate(s.id)}
              style={{
                background: active === s.id ? COLORS[i] : "transparent",
                border: active === s.id ? "2px solid var(--nb-border)" : "2px solid transparent",
                boxShadow: active === s.id ? "2px 2px 0 var(--nb-shadow)" : "none",
                padding: "6px 12px", cursor: "pointer",
                fontFamily: "var(--mono)", fontSize: "0.65rem", fontWeight: 700,
                textTransform: "uppercase", letterSpacing: "0.08em",
                transition: "all 0.15s",
              }}
            >
              {s.label}
            </button>
          ))}
        </div>

        <button
          className="mobile-toggle"
          onClick={() => setMobileOpen(!mobileOpen)}
          style={{
            display: "none", background: "var(--nb-yellow)",
            border: "3px solid var(--nb-border)", padding: "6px 12px",
            fontFamily: "var(--heading)", fontSize: "1rem", fontWeight: 800,
            cursor: "pointer", boxShadow: "3px 3px 0 var(--nb-shadow)",
          }}
        >
          {mobileOpen ? "✕" : "☰"}
        </button>
      </div>

      {mobileOpen && (
        <div className="mobile-nav-dropdown" style={{
          borderTop: "3px solid var(--nb-border)", padding: "12px 0 20px",
          display: "flex", flexDirection: "column", gap: 8,
        }}>
          {SECTIONS.filter(s => s.id !== "home").map((s, i) => (
            <button
              key={s.id}
              onClick={() => { onNavigate(s.id); setMobileOpen(false); }}

/* ─── FadeIn ─── */
function FadeIn({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } },
      { threshold: 0.1 }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: vis ? 1 : 0,
      transform: vis ? "translateY(0)" : "translateY(24px)",
      transition: `opacity 0.5s ease ${delay}s, transform 0.5s ease ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

                The project that represents my best work this semester is the Tabi boot essay. The first draft was mostly summary. It read fine but it did not really say anything. The biggest shift came when I decided to make the cultural borrowing question a real part of the essay instead of something I mentioned and moved past. In early drafts I had one paragraph that basically said "some people think it is appropriation, some do not" and left it there. That felt like a cop-out. In revision I expanded that section to actually sit with the tension, presenting both perspectives without pretending I had a clean answer. I also restructured the whole essay, moving the deconstructivist philosophy higher and letting the cultural borrowing section sit near the end as the real pivot point. The closing paragraph about the 1988 runway was originally buried in the middle. Putting it at the end gave it more weight.
              </p>
              <p style={{ fontFamily: "var(--body)", fontSize: "0.95rem", lineHeight: 1.85 }}>
                The HBO Max narrative needed a different kind of revision. My first drafts leaned into dramatic language that made everything a "pivotal moment." I scaled that back because the real story is more interesting when it sounds like how someone would actually tell it. The middle section got cut down to get to the iceberg idea faster. The Harajuku autoethnography benefited from the lessons of the first two. The biggest revision was being honest about the limits of my relationship to the culture. Early drafts overclaimed. Dialing that back made the essay more credible.
              </p>
              <p style={{ fontFamily: "var(--body)", fontSize: "0.95rem", lineHeight: 1.85 }}>
                The through line across all three: every draft got better when I cut the parts that were performing and kept the parts that were thinking.
              </p>
              <p style={{ fontFamily: "var(--body)", fontSize: "0.95rem", lineHeight: 1.85, marginTop: 12 }}>
                Winson Chen
              </p>
